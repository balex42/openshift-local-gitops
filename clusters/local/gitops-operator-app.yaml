apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-operator
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/openshift-local-gitops  # replace with your repo URL
    targetRevision: HEAD
    path: apps/gitops-operator/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
