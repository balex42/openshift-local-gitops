apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:balex42/openshift-local-gitops.git
    targetRevision: HEAD
    path: clusters/local
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  resourceTrackingMethod: annotation+label
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
