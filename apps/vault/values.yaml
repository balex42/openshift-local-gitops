global:
  openshift: true

server:
  image:
    repository: docker.io/hashicorp/vault
    tag: "1.18.1"
  dev:
    enabled: true
  route:
    enabled: true
    host: vault.apps-crc.testing
    tls:
      termination: edge

# Vault agent injector conflicts with ESO; disable it
injector:
  enabled: false
